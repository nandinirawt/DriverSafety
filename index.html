<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Driver Safety</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🚗 AI Driver Safety System</h1>
    <p>Real-time drowsiness detection and emergency response</p>
  </header>
<h2>Live Road Detection</h2>

<img src="http://127.0.0.1:5001/video" width="800">
  <!-- CAMERA / AI SECTION -->
  <section id="ai-section">
    <h2>🎥 Driver Monitoring</h2>

    <div class="camera-box">
      <div style="position:relative; display:inline-block;">
  <video id="camera" autoplay playsinline></video>
</div>
      <h3 id="ai-result">AI detecting...</h3>
      <div class="overlay">Analyzing...</div>
    </div>

    <p id="status">Status: <span class="safe">Awake</span></p>
    <button onclick="startDemo()">Start Demo</button>
    <button onclick="setMode('driver')">Driver Mode</button>
    <button onclick="setMode('road')">Road Mode</button>
  </section>

  <!-- ALERT SECTION -->
  <section id="alert-section">
    <h2>🔊 Alerts</h2>
    <p id="alert-text">No alerts yet</p>
  </section>

  <!-- SOS SECTION -->
  <section id="sos-section">
    <h2>🚨 Emergency</h2>
    <p id="sos-status">SOS inactive</p>
    <button onclick="triggerSOS()">Send SOS</button>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>Made with ❤️ by Team AI Safety</p>
  </footer>

  <!-- JS FILES (order matters) -->
  <script src="ai.js"></script>
  <script src="alert.js"></script>
  <script src="sos.js"></script>
  <script src="main.js"></script>
  <script src="road.js"></script>

</body>
</html>

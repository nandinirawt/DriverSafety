<!DOCTYPE html>
<html>
<head>
    <title>AI Driver Drowsiness Monitor</title>
    <style>
        body { 
            background: #111; 
            color: white; 
            text-align: center; 
            font-family: Arial;
        }
        h1 { margin-top: 20px; }

        #alertBox {
            width: 200px;
            height: 50px;
            margin: 20px auto;
            line-height: 50px;
            border-radius: 10px;
            font-weight: bold;
        }

        .safe { background: green; }
        .warning { background: orange; }
        .danger { background: red; }
    </style>
</head>
<body>

<h1>AI Driver Drowsiness Detection</h1>

<img src="{{ url_for('video') }}" width="700">

<h2 id="score">Fatigue Score: 0</h2>

<div id="alertBox" class="safe">SAFE</div>

<script>
    setInterval(() => {
        fetch('/fatigue')
            .then(res => res.json())
            .then(data => {
                const score = data.score;
                document.getElementById('score').innerText =
                    "Fatigue Score: " + score;

                const box = document.getElementById('alertBox');

                if (score < 3) {
                    box.className = "safe";
                    box.innerText = "SAFE";
                } else if (score < 6) {
                    box.className = "warning";
                    box.innerText = "WARNING";
                } else {
                    box.className = "danger";
                    box.innerText = "DROWSY!";
                }
            });
    }, 1000);
</script>

</body>
</html>
